<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#000080"/>
  <!-- Grid lines -->
  <rect x="60" y="60" width="392" height="392" rx="8" fill="#ffffff" opacity="0.08"/>
  <!-- Lotus green leaf / lotus symbol -->
  <ellipse cx="256" cy="200" rx="120" ry="60" fill="#00aa55" opacity="0.9"/>
  <ellipse cx="256" cy="200" rx="80" ry="40" fill="#00cc66"/>
  <!-- Spreadsheet grid icon -->
  <rect x="80" y="260" width="352" height="180" rx="6" fill="#ffffff" opacity="0.95"/>
  <!-- Grid rows -->
  <line x1="80" y1="295" x2="432" y2="295" stroke="#d4d0c8" stroke-width="1.5"/>
  <line x1="80" y1="330" x2="432" y2="330" stroke="#d4d0c8" stroke-width="1.5"/>
  <line x1="80" y1="365" x2="432" y2="365" stroke="#d4d0c8" stroke-width="1.5"/>
  <line x1="80" y1="400" x2="432" y2="400" stroke="#d4d0c8" stroke-width="1.5"/>
  <!-- Grid cols -->
  <line x1="160" y1="260" x2="160" y2="440" stroke="#d4d0c8" stroke-width="1.5"/>
  <line x1="240" y1="260" x2="240" y2="440" stroke="#d4d0c8" stroke-width="1.5"/>
  <line x1="320" y1="260" x2="320" y2="440" stroke="#d4d0c8" stroke-width="1.5"/>
  <line x1="400" y1="260" x2="400" y2="440" stroke="#d4d0c8" stroke-width="1.5"/>
  <!-- Header row fill -->
  <rect x="80" y="260" width="352" height="35" rx="6" fill="#000080"/>
  <!-- Col header labels -->
  <text x="120" y="283" font-family="Tahoma,sans-serif" font-size="16" fill="white" text-anchor="middle">A</text>
  <text x="200" y="283" font-family="Tahoma,sans-serif" font-size="16" fill="white" text-anchor="middle">B</text>
  <text x="280" y="283" font-family="Tahoma,sans-serif" font-size="16" fill="white" text-anchor="middle">C</text>
  <text x="360" y="283" font-family="Tahoma,sans-serif" font-size="16" fill="white" text-anchor="middle">D</text>
  <!-- Selected cell highlight -->
  <rect x="80" y="295" width="80" height="35" fill="#316ac5" opacity="0.7"/>
  <!-- Text in cells -->
  <text x="92" y="318" font-family="Tahoma,sans-serif" font-size="13" fill="#ffffff">1234</text>
  <text x="172" y="318" font-family="Tahoma,sans-serif" font-size="13" fill="#333">5678</text>
  <text x="252" y="318" font-family="Tahoma,sans-serif" font-size="13" fill="#333">9012</text>
  <text x="92" y="353" font-family="Tahoma,sans-serif" font-size="13" fill="#333">Sales</text>
  <!-- 1-2-3 text -->
  <text x="256" y="175" font-family="Tahoma,sans-serif" font-size="52" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.95">1-2-3</text>
  <!-- LOTUS label -->
  <text x="256" y="230" font-family="Tahoma,sans-serif" font-size="22" fill="#00ff88" text-anchor="middle" letter-spacing="6">LOTUS</text>
</svg>
